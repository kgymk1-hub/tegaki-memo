<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="manifest.json" />
  <title>手書きメモ</title>
  <link rel="stylesheet" href="style.css?v=16" />
  <script src="js/state.js?v=16" defer></script>
  <script src="js/utils.js?v=16" defer></script>
  <script src="js/history.js?v=16" defer></script>
  <script src="js/layers.js?v=16" defer></script>
  <script src="js/canvas-render.js?v=16" defer></script>
  <script src="js/drawing-tools.js?v=16" defer></script>
  <script src="js/image-placement.js?v=16" defer></script>
  <script src="js/project-storage.js?v=16" defer></script>
  <script src="js/ui.js?v=16" defer></script>
  <script src="js/pwa.js?v=16" defer></script>
  <script src="js/app.js?v=16" defer></script>
</head>
<body>
  <header>
    <div class="title-row">
      <h1>手書きメモ</h1>
      <div class="status" id="status">ペン：黒 / 太さ：普通</div>
    </div>

    <div class="toolbar">
      <div class="tool-row" aria-label="描画ツール">
        <button id="penBtn" data-tool="pen" class="active" type="button">ペン</button>
        <button id="markerBtn" data-tool="marker" type="button">マーカー</button>
        <button id="eraserBtn" data-tool="eraser" type="button">消しゴム</button>
        <button id="lineBtn" data-tool="line" type="button">直線</button>
        <button id="rectBtn" data-tool="rect" type="button">四角</button>
        <button id="ellipseBtn" data-tool="ellipse" type="button">円</button>
        <button id="arrowBtn" data-tool="arrow" type="button">矢印</button>
        <button id="dashedLineBtn" data-tool="dashedLine" type="button">点線</button>
        <button id="textBtn" data-tool="text" type="button">文字</button>
        <button id="undoBtn" type="button" disabled>戻す</button>
        <button id="clearBtn" class="danger" type="button">選択レイヤー消去</button>
        <button id="saveBtn" class="primary" type="button">PNG保存</button>
        <button id="saveProjectBtn" class="primary" type="button">作業保存</button>
        <button id="loadProjectBtn" type="button">作業読込</button>
        <input id="projectFileInput" type="file" accept=".tegaki,application/json" hidden />
        <button id="clearAutoSaveBtn" type="button">自動保存削除</button>
      </div>

      <div class="tool-row" aria-label="色と太さ">
        <button class="colorBtn active" type="button" data-color="#111827">黒</button>
        <button class="colorBtn" type="button" data-color="#dc2626">赤</button>
        <button class="colorBtn" type="button" data-color="#2563eb">青</button>
        <button class="colorBtn" type="button" data-color="#16a34a">緑</button>

        <label>
          色
          <input id="customColor" type="color" value="#111827" />
        </label>

        <label>
          太さ
          <select id="sizeSelect">
            <option value="3">細い</option>
            <option value="7" selected>普通</option>
            <option value="14">太い</option>
            <option value="24">極太</option>
          </select>
        </label>
      </div>

      <div class="tool-row" aria-label="背景と画像">
        <label>
          背景
          <select id="backgroundModeSelect">
            <option value="white" selected>白</option>
            <option value="color">色</option>
            <option value="transparent">透明</option>
          </select>
        </label>

        <label>
          背景色
          <input id="backgroundColorInput" type="color" value="#ffffff" />
        </label>

        <label>
          画像読込先
          <select id="imageImportMode">
            <option value="new-layer" selected>新規レイヤー</option>
            <option value="current-layer">現在レイヤー</option>
          </select>
        </label>

        <button id="loadImageBtn" type="button">画像読込</button>
        <button id="confirmImageBtn" class="primary" type="button" disabled>確定</button>
        <button id="cancelImageBtn" type="button" disabled>取消</button>

        <label class="image-scale-control" for="imageScaleInput">
          画像倍率
          <input id="imageScaleInput" type="range" min="10" max="300" value="100" step="5" disabled />
          <span id="imageScaleValue">100%</span>
        </label>

        <button id="rotateImageLeftBtn" type="button" disabled>左90°</button>
        <button id="rotateImageRightBtn" type="button" disabled>右90°</button>
        <input id="imageInput" type="file" accept="image/*" hidden />
      </div>

      <div class="tool-row" aria-label="レイヤー操作">
        <label>
          レイヤー
          <select id="layerSelect"></select>
        </label>

        <button id="addLayerBtn" type="button">追加</button>
        <button id="duplicateLayerBtn" type="button">複製</button>
        <button id="deleteLayerBtn" type="button">削除</button>
        <button id="renameLayerBtn" type="button">名前変更</button>
        <button id="moveLayerUpBtn" type="button">上へ</button>
        <button id="moveLayerDownBtn" type="button">下へ</button>
        <button id="mergeLayerDownBtn" type="button">下へ結合</button>
        <button id="toggleLayerVisibilityBtn" type="button">非表示</button>

        <label class="opacity-control">
          選択レイヤー透明度
          <input id="layerOpacityInput" type="range" min="10" max="100" step="10" value="100" />
          <span id="layerOpacityValue">100%</span>
        </label>
      </div>
    </div>
  </header>

  <main>
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="drawingCanvas"></canvas>
      <div class="hint" id="hint">指やタッチペンでここに描けます</div>
    </div>
  </main>
</body>
</html>
